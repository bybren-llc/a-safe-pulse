version: '3'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - LINEAR_CLIENT_ID=${LINEAR_CLIENT_ID}
      - LINEAR_CLIENT_SECRET=${LINEAR_CLIENT_SECRET}
      - LINEAR_REDIRECT_URI=${LINEAR_REDIRECT_URI}
      - CONFLUENCE_CLIENT_ID=${CONFLUENCE_CLIENT_ID}
      - CONFLUENCE_CLIENT_SECRET=${CONFLUENCE_CLIENT_SECRET}
      - APP_URL=${APP_URL}
      - SESSION_SECRET=${SESSION_SECRET}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/linear_agent
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - PORT=3000
      - CONFLUENCE_CLIENT_ID=${CONFLUENCE_CLIENT_ID}
      - CONFLUENCE_CLIENT_SECRET=${CONFLUENCE_CLIENT_SECRET}
      - APP_URL=${APP_URL}
      - SESSION_SECRET=${SESSION_SECRET}
      - CONFLUENCE_USERNAME=${CONFLUENCE_USERNAME}
      - CONFLUENCE_API_TOKEN=${CONFLUENCE_API_TOKEN}
      - CONFLUENCE_BASE_URL=${CONFLUENCE_BASE_URL}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
      - SQLITE_DB_PATH=/app/data/sync.db
      - NODE_ENV=production
    volumes:
      - sqlite_data:/app/data
    depends_on:
      - db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  db:
    image: postgres:14
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=linear_agent
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

volumes:
  postgres_data:
  sqlite_data:
