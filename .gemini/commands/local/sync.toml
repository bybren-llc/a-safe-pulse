description = "Full local development sync after git pull"

prompt = """
# Local Sync Command

Perform complete local development environment sync after pulling from dev branch. This ensures dependencies, database, and validation are all up-to-date.

## Workflow

### 1. Git Branch Cleanup (Best Practice)

Check current branch and switch to dev if needed:

```bash
!{git branch --show-current}
```

If on feature branch:
- Check for uncommitted changes
- If clean, switch to dev: `git checkout dev`
- If dirty, offer to stash: `git stash && git checkout dev`

### 2. Git Pull

Pull latest changes from origin/dev:

```bash
!{git pull origin dev}
```

If pull fails due to uncommitted changes:
- Stash changes: `git stash`
- Pull again
- Reapply stash: `git stash pop`

### 3. Branch Cleanup (Git Best Practice)

After pulling latest dev, clean up merged branches:

```bash
!{git branch --merged dev | grep -v "^\\*" | grep -v "dev" | grep -v "master"}
```

Offer to delete merged feature branches.

Prune remote tracking branches:

```bash
!{git fetch --prune origin}
```

### 4. Smart Change Detection

Detect what changed to determine necessary steps:

```bash
!{git diff HEAD@{1} HEAD -- package.json package-lock.json 2>/dev/null | head -5}
```

**Decision Logic**:
- If deps changed → Run npm install
- If schema changed → Check migration files
- If both empty → Fast path: Jump to Docker check

### 5. Install Dependencies (Conditional)

Only run if package.json or package-lock.json changed:

```bash
!{npm install 2>&1 || echo "Install completed"}
```

### 6. Database Migration Check (Conditional)

Only run if migration files changed:

```bash
!{ls -la src/db/migrations/ 2>&1 || echo "Migration check completed"}
```

Note: Raw SQL migrations in `src/db/migrations/` run automatically on application startup.

### 7. Validation (Optional)

Ask user: "Run full validation (npm test && npm run build)?"

If user chooses Yes:

```bash
!{npm test && npm run build 2>&1 || echo "Validation completed"}
```

### 8. Docker Services Check

Verify Docker services are running:

```bash
!{docker ps --filter name={PROJECT_NAME} --format 'table {{.Names}}\t{{.Status}}\t{{.State}}' 2>/dev/null || echo "Docker check completed"}
```

If services not running, suggest starting them.

## Status Report

Generate comprehensive sync report showing:
- Git sync status (branch, commits pulled)
- Dependencies status
- Database status
- Docker services status
- Overall health

## Success Criteria

- Git pull successful
- Dependencies installed (if changed)
- Migration files reviewed (if changed)
- No pending migrations (or applied if schema changed)
- Docker services running
- Clear status report provided
"""
